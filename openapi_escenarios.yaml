openapi: 3.1.0
info:
  title: CEPLAN Escenarios API
  description: Recibe escenarios narrativos prospectivos y genera un dashboard HTML interactivo.
  version: 1.0.0
servers:
  - url: https://escenarios-palominogeraldo23-5744s-projects.vercel.app
paths:
  /generateScenario:
    post:
      operationId: generateScenario
      summary: Recibe el JSON de escenarios y devuelve una URL de dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioRequest'
      responses:
        "200":
          description: URL del dashboard generado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  view_url:
                    type: string
                    description: URL completa del dashboard
                  message:
                    type: string

components:
  schemas:
    ScenarioRequest:
      type: object
      required:
        - encabezado
        - insumos
        - lectura_prospectiva
        - escenarios
        - cierre
      properties:

        encabezado:
          type: object
          description: Datos de entrada del ejercicio
          required: [tema, sector, territorio, horizonte, pregunta_central]
          properties:
            tema:
              type: string
              example: "Integración logística del puerto de Chancay"
            sector:
              type: string
              example: "Infraestructura y comercio exterior"
            territorio:
              type: string
              example: "Perú"
            horizonte:
              type: string
              example: "2025–2035"
            pregunta_central:
              type: string
              example: "¿En qué medida el puerto de Chancay transformará la posición geopolítica del Perú en la región?"

        insumos:
          type: object
          description: Insumos prospectivos seleccionados
          properties:
            tendencias:
              type: array
              maxItems: 5
              items:
                type: object
                required: [nombre, pertinencia]
                properties:
                  nombre:
                    type: string
                  pertinencia:
                    type: string
                    description: Frase breve de por qué fue seleccionada
            riesgos:
              type: array
              maxItems: 3
              items:
                type: object
                required: [nombre, pertinencia]
                properties:
                  nombre:
                    type: string
                  pertinencia:
                    type: string
            oportunidades:
              type: array
              maxItems: 3
              items:
                type: object
                required: [nombre, pertinencia]
                properties:
                  nombre:
                    type: string
                  pertinencia:
                    type: string
            megatendencias:
              type: array
              maxItems: 2
              items:
                type: object
                required: [nombre, pertinencia]
                properties:
                  nombre:
                    type: string
                  pertinencia:
                    type: string

        lectura_prospectiva:
          type: string
          description: Párrafo de 80 a 120 palabras con el patrón general, tensiones y dinámica futura

        escenarios:
          type: array
          minItems: 3
          maxItems: 3
          description: Exactamente tres escenarios en orden Tendencial, Optimista, Adverso
          items:
            $ref: '#/components/schemas/Escenario'

        cierre:
          type: object
          required: [hallazgos, advertencia_metodologica, descargo]
          properties:
            hallazgos:
              type: array
              description: Lista de 3 a 5 hallazgos principales
              items:
                type: string
            advertencia_metodologica:
              type: string
            descargo:
              type: string

        metadata:
          type: object
          description: Metadatos opcionales de generación
          properties:
            generated_at:
              type: string
              description: Fecha y hora ISO-8601
            model:
              type: string
              description: Nombre del modelo que generó el contenido

    Escenario:
      type: object
      required:
        - nombre
        - tipo
        - narrativa
        - impulsores
        - riesgos
        - oportunidades
        - implicancias
        - senales_monitoreo
      properties:
        nombre:
          type: string
          description: Título evocador del escenario (no genérico)
          example: "La ruta del jade"
        tipo:
          type: string
          enum: [Tendencial, Optimista, Adverso]
        narrativa:
          type: string
          description: 120 a 180 palabras en tiempo futuro, tercera persona
        impulsores:
          type: array
          description: 3 a 5 impulsores principales
          minItems: 3
          maxItems: 5
          items:
            type: string
        riesgos:
          type: array
          description: 2 a 3 riesgos asociados al escenario
          minItems: 2
          maxItems: 3
          items:
            type: string
        oportunidades:
          type: array
          description: 2 a 3 oportunidades asociadas al escenario
          minItems: 2
          maxItems: 3
          items:
            type: string
        implicancias:
          type: array
          description: 2 a 4 implicancias estratégicas orientadas a decisión
          minItems: 2
          maxItems: 4
          items:
            type: string
        senales_monitoreo:
          type: array
          description: 3 a 5 señales o indicadores observables y concretos
          minItems: 3
          maxItems: 5
          items:
            type: string
